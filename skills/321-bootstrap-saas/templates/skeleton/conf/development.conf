my $config = {
    moniker                 => 'l2d.web',
    base_url                => 'http://l2d.example.dev:8500',
    domain                  => 'l2d.example.dev',
    db_connect_string       => 'postgresql:///l2d',
    cookie_secrets          => ['change-me-dev'],
    session_max_age         => 60 * 60 * 24 * 14,
    postmark_server_token   => '',   # empty on dev => passcode emails are LOGGED, not sent
    postmark_from_email     => 'hello@l2d.example',
    postmark_message_stream => 'outbound',
    hypnotoad => {
        listen  => ['http://*:8500'],
        proxy   => 1,
        workers => 2,
    },
};

# Merge git-ignored per-host secrets (Stripe/Postmark keys) if present. Keyed on
# $ENV{MOJO_HOME} (set by bin/l2d) so `321 do` subcommands find it too.
if ($ENV{MOJO_HOME} && -r "$ENV{MOJO_HOME}/conf/secrets.local.conf") {
    my $extra = do "$ENV{MOJO_HOME}/conf/secrets.local.conf";
    %$config = (%$config, %$extra) if ref $extra eq 'HASH';
}

$config;
