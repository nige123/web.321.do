my $config = {
    moniker                 => 'l2d.web',
    base_url                => 'https://l2d.example',
    domain                  => 'l2d.example',
    db_connect_string       => 'postgresql://user:password@your-db-host:5432/l2d',
    cookie_secrets          => ['change-me-live'],
    session_max_age         => 60 * 60 * 24 * 14,
    cookie_domain           => 'l2d.example',   # share login across apex + subdomains (dev/test stay host-only)
    postmark_server_token   => '',   # real token loads from conf/secrets.local.conf on the live host
    postmark_from_email     => 'hello@l2d.example',
    postmark_message_stream => 'outbound',
    hypnotoad => {
        listen  => ['http://*:8500'],
        accepts => 1000,
        proxy   => 1,
        workers => 4,
    },
};

# Merge git-ignored per-host secrets (LIVE keys on the production host).
if ($ENV{MOJO_HOME} && -r "$ENV{MOJO_HOME}/conf/secrets.local.conf") {
    my $extra = do "$ENV{MOJO_HOME}/conf/secrets.local.conf";
    %$config = (%$config, %$extra) if ref $extra eq 'HASH';
}

$config;
